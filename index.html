<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

      appId: "592e3747-c27d-49f1-a028-d5961d83381d",

<style>
/* (All your existing CSS remains exactly the same as provided) */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--red:#c0392b;--red-dim:#7a1f15;--red-glow:rgba(192,57,43,0.18);
  --white:#f0f0f0;--muted:#666;--gold:#d4a853;--silver:#9ba3af;--bronze:#c47a4a;
  --glass-bg:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);
  --glass-bg-strong:rgba(255,255,255,0.07);--glass-border-strong:rgba(255,255,255,0.14);
}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--white)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(192,57,43,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(192,57,43,0.08) 0%,transparent 60%);animation:bgshift 12s ease-in-out infinite alternate;pointer-events:none;z-index:0}
@keyframes bgshift{0%{opacity:.8}100%{opacity:1}}
#app{position:relative;z-index:1;min-height:100vh;padding-bottom:2rem}
.header{position:sticky;top:0;z-index:50;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.75);border-bottom:1px solid var(--glass-border);backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8)}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
.header p{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:6px;border:1px solid var(--glass-border-strong);background:var(--glass-bg-strong);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--white);padding:7px 13px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s ease;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 60%);pointer-events:none}
.btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.btn:active{transform:scale(.97) translateY(0)}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-red{background:rgba(192,57,43,0.7);border-color:rgba(192,57,43,0.5)}
.btn-red:hover{background:rgba(192,57,43,0.9)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.35);backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;font-size:10px;font-weight:600;color:var(--red);letter-spacing:1px;text-transform:uppercase}
.pulse{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--glass-border);border-bottom:1px solid var(--glass-border)}
.stat-cell{background:rgba(255,255,255,0.025);backdrop-filter:blur(10px);padding:.8rem .5rem;text-align:center;position:relative;overflow:hidden}
.stat-cell .val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.stat-cell .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.section-label{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:1.2rem 1.2rem .5rem}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 1rem 1rem}
.pc{border-radius:16px;padding:1rem .7rem;text-align:center;position:relative;overflow:hidden}
.pc.r1{background:linear-gradient(145deg,rgba(212,168,83,0.15) 0%,rgba(255,255,255,0.04) 50%,rgba(212,168,83,0.05) 100%);border:1px solid rgba(212,168,83,0.3)}
.pc.r2{background:linear-gradient(145deg,rgba(155,163,175,0.12) 0%,rgba(255,255,255,0.04) 50%,rgba(155,163,175,0.04) 100%);border:1px solid rgba(155,163,175,0.25)}
.pc.r3{background:linear-gradient(145deg,rgba(196,122,74,0.12) 0%,rgba(255,255,255,0.04) 50%,rgba(196,122,74,0.04) 100%);border:1px solid rgba(196,122,74,0.25)}
.pc .logo{width:38px;height:38px;border-radius:50%;object-fit:cover;margin:0 auto 7px;display:block}
.pc .sc{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.list{padding:0 1rem;display:flex;flex-direction:column;gap:6px}
.row{border-radius:10px;display:grid;grid-template-columns:28px auto 1fr auto;align-items:center;gap:8px;padding:.65rem .85rem;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.02) 100%);border:1px solid var(--glass-border)}
.footer{text-align:center;font-size:11px;color:var(--muted);padding:1.5rem}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>NETHINETHERA</h1>
      <p>MPMU · Live School Leaderboard</p>
    </div>
    <div class="header-right">
      <button class="btn btn-red" onclick="exportPoster()">Export</button>
      <div class="live-badge"><div class="pulse"></div>LIVE</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell"><div class="val" id="s-schools">—</div><div class="lbl">Schools</div></div>
    <div class="stat-cell"><div class="val" id="s-total">—</div><div class="lbl">Total Votes</div></div>
    <div class="stat-cell"><div class="val" id="s-time">—</div><div class="lbl">Updated</div></div>
  </div>
  <div id="board"><div class="loading">Connecting to live data…</div></div>
  <div class="footer">Auto-refresh every <b>10s</b> · next in <b><span id="cd">10</span>s</b></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const API   = 'https://osxijjbjgxvaeurpghtv.supabase.co/rest/v1/mpmu_votes?select=registered_candidate,vote_count&order=vote_count.desc';
const KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zeGlqamJqZ3h2YWV1cnBnaHR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTA4NDgsImV4cCI6MjA4NzMyNjg0OH0.8SxJtzpnr0snvzXke_bIwkcVpwUfMxRfb0Y407Z0UE4';
const MARIS = 59;

const SCHOOLS = {
  23:{name:"Muslim Ladies College",        mu:"Media Unit of Muslim Ladies College",      logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/7.png"},
  19:{name:"Mahinda Rajapaksha Nat. School",mu:"Mahindians Media & Broadcasting Unit",   logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/9.png"},
  24:{name:"Yasodara Balika Vidyalaya",    mu:"Media Unit of Yasodara Vidyalaya",         logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/6.png"},
  21:{name:"D.S. Senanayake College",      mu:"Media Circle of DS Senanayake College",    logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/8.png"},
  51:{name:"St. Aloysius College, Galle",  mu:"Aloysian Mass Media Unit",                 logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/4.png"},
  16:{name:"Negombo South Int. School",    mu:"Media Unit of NSIS Nittambuwa",            logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/10.png"},
  59:{name:"Maris Stella College, Negombo",mu:"Educational Media Unit",                   logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/1.png"},
  58:{name:"Galahitiyawa Central College", mu:"Parakum Sihanada Media Unit",              logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/2.png"},
  57:{name:"Devi Balika Vidyalaya",        mu:"Media Unit of Devi Balika Vidyalaya",      logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/3.png"},
  33:{name:"Anula Vidyalaya, Nugegoda",    mu:"Media Unit of Anula Vidyalaya",            logo:"https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/5.png"},
};

const info  = id => SCHOOLS[id]||{name:'School #'+id,mu:'',logo:''};
const fmt   = n  => n>=1000?(n/1000).toFixed(1)+'k':n.toLocaleString();
const medal = r  => r===1?'🥇':r===2?'🥈':'🥉';

let prev={}, lastData=[];

/* ── RENDER ── */
function render(data){
  lastData=data;
  const sorted=[...data].sort((a,b)=>b.vote_count-a.vote_count);
  const total=sorted.reduce((s,x)=>s+x.vote_count,0);
  const maxV=sorted[0]?.vote_count||1;
  const top3=sorted.slice(0,3);

  document.getElementById('s-schools').textContent=sorted.length;
  document.getElementById('s-total').textContent=fmt(total);
  document.getElementById('s-time').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const podOrder=top3.length>=2?[top3[1],top3[0],top3[2]]:[...top3];
  const podRanks=top3.length>=2?[2,1,3]:[1,2,3];
  let html=`<div class="section-label">Top 3</div><div class="podium">`;
  podOrder.forEach((s,i)=>{
    if(!s){html+=`<div class="pc"></div>`;return;}
    const r=podRanks[i],sc=info(s.registered_candidate);
    html+=`<div class="pc r${r}">${medal(r)} ${sc.logo?`<img class="logo" src="${sc.logo}" crossorigin="anonymous">`:''} <div class="sc">${s.vote_count.toLocaleString()}</div></div>`;
  });
  html+=`</div><div class="section-label">Full Rankings</div><div class="list">`;
  sorted.forEach((s,i)=>{
    const sc=info(s.registered_candidate);
    html+=`<div class="row"><div>${i+1}</div>${sc.logo?`<img src="${sc.logo}" style="width:28px;height:28px;border-radius:50%" crossorigin="anonymous">`:''} <div>${sc.name}</div><div style="text-align:right">${s.vote_count.toLocaleString()}</div></div>`;
  });
  document.getElementById('board').innerHTML=html;
}

/* ── FETCH ── */
async function fetchData(){
  try{
    const res=await fetch(API,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data&&data.length) render(data);
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="err">Could not fetch scores.</div>`;
  }
}

let secs=10;
setInterval(()=>{secs--;document.getElementById('cd').textContent=secs;if(secs<=0){secs=10;fetchData();}},1000);
fetchData();
</script>
</body>
</html>
