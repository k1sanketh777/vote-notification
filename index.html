<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nethinethera · Live Leaderboard</title>
<link rel="icon" type="image/png" href="https://osxijjbjgxvaeurpghtv.supabase.co/storage/v1/object/public/mpmu-logos/logos/1.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--red:#c0392b;--red-dim:#7a1f15;--red-glow:rgba(192,57,43,0.18);
  --white:#f0f0f0;--muted:#666;--gold:#d4a853;--silver:#9ba3af;--bronze:#c47a4a;
  --glass-bg:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.09);
  --glass-bg-strong:rgba(255,255,255,0.07);--glass-border-strong:rgba(255,255,255,0.14);
}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--white)}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(192,57,43,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(192,57,43,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 30%,rgba(255,255,255,0.02) 0%,transparent 50%);
  animation:bgshift 12s ease-in-out infinite alternate;
  pointer-events:none;z-index:0;
}
@keyframes bgshift{0%{opacity:.8}100%{opacity:1}}
#app{position:relative;z-index:1;min-height:100vh;padding-bottom:2rem}

/* HEADER */
.header{position:sticky;top:0;z-index:50;padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.75);border-bottom:1px solid var(--glass-border);backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8)}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
.header p{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* BUTTONS */
.btn{display:flex;align-items:center;gap:6px;border:1px solid var(--glass-border-strong);background:var(--glass-bg-strong);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--white);padding:7px 13px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .25s ease;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1) 0%,transparent 60%);pointer-events:none}
.btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.btn:active{transform:scale(.97) translateY(0)}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-red{background:rgba(192,57,43,0.7);border-color:rgba(192,57,43,0.5)}
.btn-red:hover{background:rgba(192,57,43,0.9)}
.btn-green{background:rgba(39,174,96,0.5);border-color:rgba(39,174,96,0.4)}
.btn-green:hover{background:rgba(39,174,96,0.75)}
.btn-green.active-notif{background:rgba(39,174,96,0.8);border-color:rgba(39,174,96,0.7);box-shadow:0 0 14px rgba(39,174,96,0.3)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.35);backdrop-filter:blur(8px);padding:5px 14px;border-radius:20px;font-size:10px;font-weight:600;color:var(--red);letter-spacing:1px;text-transform:uppercase}
.pulse{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}

/* NOTIF BANNER */
#notif-banner{display:none;margin:.8rem 1rem 0;background:linear-gradient(135deg,rgba(39,174,96,0.12) 0%,rgba(255,255,255,0.04) 100%);border:1px solid rgba(39,174,96,0.3);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:12px;padding:.8rem 1.1rem;font-size:12px;color:#6dca8a;line-height:1.6;animation:slidein .4s ease}
#notif-banner.red{background:linear-gradient(135deg,rgba(192,57,43,0.12) 0%,rgba(255,255,255,0.04) 100%);border-color:rgba(192,57,43,0.3);color:#e57373}
@keyframes slidein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--glass-border);border-bottom:1px solid var(--glass-border)}
.stat-cell{background:rgba(255,255,255,0.025);backdrop-filter:blur(10px);padding:.8rem .5rem;text-align:center;position:relative;overflow:hidden}
.stat-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)}
.stat-cell .val{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px}
.stat-cell .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}

/* ── COUNTDOWN ANIMATION ── */
#s-midnight{
  font-family:'DM Mono',monospace;
  letter-spacing:2px;
  transition:color .3s ease;
  display:inline-block;
}
.countdown-tick{
  animation:ctick .15s ease-out;
}
@keyframes ctick{
  0%{transform:scale(1.15);color:#d4a853}
  100%{transform:scale(1);color:inherit}
}
.countdown-urgent{
  color:#c0392b !important;
  animation:urgentpulse 1s ease-in-out infinite;
}
@keyframes urgentpulse{
  0%,100%{text-shadow:0 0 0 transparent}
  50%{text-shadow:0 0 20px rgba(192,57,43,0.8)}
}

/* SECTION LABEL */
.section-label{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding:1.2rem 1.2rem .5rem}

/* PODIUM - 3 column layout: 2nd | 1st | 3rd */
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 1rem 1rem;align-items:end}
.pc{border-radius:16px;padding:1rem .7rem;text-align:center;position:relative;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.02) 100%);border:1px solid var(--glass-border);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5)}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 100%);pointer-events:none;border-radius:16px 16px 0 0}
.pc::after{content:'';position:absolute;inset:0;border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -1px 0 rgba(0,0,0,0.2);pointer-events:none}
.pc:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
/* 1st place - full size */
.pc.r1{background:linear-gradient(145deg,rgba(212,168,83,0.15) 0%,rgba(255,255,255,0.04) 50%,rgba(212,168,83,0.05) 100%);border:1px solid rgba(212,168,83,0.3);padding:1.3rem .9rem}
/* 2nd place - slightly smaller */
.pc.r2{background:linear-gradient(145deg,rgba(155,163,175,0.12) 0%,rgba(255,255,255,0.04) 50%,rgba(155,163,175,0.04) 100%);border:1px solid rgba(155,163,175,0.25);transform:scale(0.93);transform-origin:bottom center}
.pc.r2:hover{transform:scale(0.93) translateY(-3px)}
/* 3rd place - even smaller */
.pc.r3{background:linear-gradient(145deg,rgba(196,122,74,0.12) 0%,rgba(255,255,255,0.04) 50%,rgba(196,122,74,0.04) 100%);border:1px solid rgba(196,122,74,0.25);transform:scale(0.86);transform-origin:bottom center}
.pc.r3:hover{transform:scale(0.86) translateY(-3px)}
.pc.maris-glow{box-shadow:0 0 30px rgba(212,168,83,0.25),0 0 60px rgba(212,168,83,0.1)!important}
.pc .ico{font-size:22px;margin-bottom:4px}
.pc .logo{width:44px;height:44px;border-radius:50%;object-fit:cover;margin:0 auto 7px;display:block;border:2px solid rgba(255,255,255,0.2);box-shadow:0 4px 14px rgba(0,0,0,0.5)}
.pc .nm{font-size:10px;font-weight:600;color:var(--white);line-height:1.3;margin-bottom:8px;min-height:28px;display:flex;align-items:center;justify-content:center}
.pc .sc{font-family:'DM Mono',monospace;font-size:20px;font-weight:500}
.pc .pt{font-size:9px;color:var(--muted);margin-top:2px}
.r1 .sc{color:var(--gold)}.r2 .sc{color:var(--silver)}.r3 .sc{color:var(--bronze)}
.r1 .logo{border-color:rgba(212,168,83,0.5);box-shadow:0 0 16px rgba(212,168,83,0.3)}
.r2 .logo{border-color:rgba(155,163,175,0.4)}
.r3 .logo{border-color:rgba(196,122,74,0.4)}

/* ── GAP ANALYSER ── */
#gap-analyser{
  margin:0 1rem 1rem;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(212,168,83,0.08) 0%,rgba(255,255,255,0.03) 60%,rgba(192,57,43,0.05) 100%);
  border:1px solid rgba(212,168,83,0.2);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  overflow:hidden;
  position:relative;
}
#gap-analyser::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,83,0.3),transparent);
}
.ga-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.1rem .6rem;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.ga-title{
  display:flex;align-items:center;gap:8px;
  font-size:9px;font-weight:600;color:rgba(212,168,83,0.9);
  letter-spacing:2px;text-transform:uppercase;
}
.ga-title-icon{font-size:14px}
.ga-rank-badge{
  font-family:'DM Mono',monospace;font-size:10px;
  color:rgba(212,168,83,0.7);
  background:rgba(212,168,83,0.08);
  border:1px solid rgba(212,168,83,0.2);
  padding:3px 10px;border-radius:12px;
  letter-spacing:.5px;
}
.ga-body{padding:.8rem 1.1rem 1rem}

/* Gap analyser 3-column: left=school above, middle=stats, right=Maris Stella */
.ga-strip{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin-bottom:.9rem;
}
.ga-school{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px;
  padding:.65rem .8rem;
  text-align:center;
}
.ga-school.ga-above {
  /* Left box - school above */
}
.ga-school.ga-maris{
  background:linear-gradient(135deg,rgba(212,168,83,0.1) 0%,rgba(255,255,255,0.04) 100%);
  border-color:rgba(212,168,83,0.3);
  border-radius:12px;
  padding:.75rem .9rem;
  position:relative;
}
.ga-school.ga-maris::before{
  content:'MSC';
  position:absolute;top:-8px;left:50%;transform:translateX(-50%);
  font-size:8px;font-weight:700;letter-spacing:1.5px;
  color:rgba(212,168,83,0.9);
  background:#0a0a0a;
  padding:1px 8px;border-radius:8px;
  border:1px solid rgba(212,168,83,0.25);
}
.ga-school .gs-logo{width:32px;height:32px;border-radius:50%;object-fit:cover;margin:0 auto 5px;display:block;border:1px solid rgba(255,255,255,0.15);box-shadow:0 2px 8px rgba(0,0,0,0.4)}
.ga-maris .gs-logo{border-color:rgba(212,168,83,0.4);box-shadow:0 0 10px rgba(212,168,83,0.2)}
.ga-school .gs-name{font-size:9px;font-weight:600;color:var(--white);line-height:1.3;margin-bottom:4px}
.ga-school .gs-votes{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--white)}
.ga-school .gs-rank{font-size:8px;color:var(--muted);margin-top:2px}
.ga-maris .gs-votes{color:var(--gold);font-size:18px}

/* gap stats in the middle column */
.ga-gaps{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 .4rem;gap:5px;
}
.ga-gap-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;padding:5px 10px;
  min-width:72px;text-align:center;
}
.ga-gap-item .gap-arrow{font-size:11px;color:var(--muted)}
.ga-gap-item .gap-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.ga-gap-item .gap-lbl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.gap-above .gap-val{color:#4caf50}
.gap-below .gap-val{color:var(--red)}
.ga-gap-item.gap-leading .gap-val{color:var(--gold)}

/* progress bar toward next rank */
.ga-progress{margin-top:.5rem}
.ga-prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ga-prog-label span{font-size:9px;color:var(--muted)}
.ga-prog-label strong{font-size:9px;color:rgba(212,168,83,0.8);font-weight:600}
.ga-prog-track{height:5px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.ga-prog-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,var(--red-dim),var(--gold));transition:width 1s ease}
.ga-status{
  margin-top:.75rem;padding:.6rem .85rem;
  border-radius:8px;font-size:11px;line-height:1.5;text-align:center;
  font-weight:500;
}
.ga-status.leading{background:rgba(212,168,83,0.1);border:1px solid rgba(212,168,83,0.2);color:rgba(212,168,83,0.9)}
.ga-status.close{background:rgba(39,174,96,0.08);border:1px solid rgba(39,174,96,0.2);color:#6dca8a}
.ga-status.behind{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);color:#e57373}

/* ROWS */
.list{padding:0 1rem;display:flex;flex-direction:column;gap:6px}
.row{border-radius:10px;display:grid;grid-template-columns:28px auto 1fr auto;align-items:center;gap:8px;padding:.65rem .85rem;position:relative;overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,background .3s;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.02) 100%);border:1px solid var(--glass-border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.row::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);pointer-events:none}
.row:hover{transform:translateX(3px);box-shadow:0 4px 20px rgba(0,0,0,0.25);background:rgba(255,255,255,0.06)}
.row.last-place{background:linear-gradient(135deg,rgba(192,57,43,0.1) 0%,rgba(255,255,255,0.02) 100%);border-color:rgba(192,57,43,0.3)}
.row.maris-row{border-color:rgba(212,168,83,0.3);background:linear-gradient(135deg,rgba(212,168,83,0.07) 0%,rgba(255,255,255,0.02) 100%)}
.row-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.12)}
.rk{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;min-width:18px}
.rn{font-size:12px;font-weight:500;color:var(--white);line-height:1.3}
.rmu{font-size:9px;color:var(--muted);margin-top:1px}
.rr{text-align:right}
.rs{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.rb-wrap{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:4px;width:64px;margin-left:auto}
.rb{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--red-dim),var(--red));transition:width 1s ease}
.last-tag{font-size:8px;color:var(--red);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-top:2px}
.delta{font-size:9px;font-weight:600;color:#4caf50;margin-left:4px;animation:popin .4s ease}
@keyframes popin{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:var(--muted);padding:1.5rem;letter-spacing:.4px}
.footer b{color:var(--red)}
.loading{padding:3rem;text-align:center;color:var(--muted);font-size:13px}
.err{margin:1rem;background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.25);backdrop-filter:blur(10px);border-radius:10px;padding:1rem 1.2rem;font-size:12px;color:#e57373;line-height:1.7}

/* FULLSCREEN */
body.fullscreen #app{position:fixed;inset:0;z-index:100;overflow-y:auto}
body.fullscreen .header{background:rgba(5,5,5,0.85);backdrop-filter:blur(40px) saturate(2);-webkit-backdrop-filter:blur(40px) saturate(2)}
body.fullscreen .podium{gap:14px;padding:0 1.5rem 1.5rem}
body.fullscreen .pc{padding:1.3rem 1rem}
body.fullscreen .pc .sc{font-size:24px}
body.fullscreen .list{padding:0 1.5rem;gap:8px}
body.fullscreen #gap-analyser{margin:0 1.5rem 1.5rem}
body.fullscreen::before{background:radial-gradient(ellipse 70% 60% at 15% 15%,rgba(192,57,43,0.18) 0%,transparent 55%),radial-gradient(ellipse 60% 70% at 85% 85%,rgba(192,57,43,0.12) 0%,transparent 55%)}

/* ALERT POPUP */
#alert-popup{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 2rem);max-width:380px;background:linear-gradient(135deg,rgba(212,168,83,0.18) 0%,rgba(10,10,10,0.95) 100%);border:1px solid rgba(212,168,83,0.4);backdrop-filter:blur(30px) saturate(1.8);-webkit-backdrop-filter:blur(30px) saturate(1.8);border-radius:16px;padding:1.2rem 1.4rem;box-shadow:0 20px 60px rgba(0,0,0,0.6);animation:popalert .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popalert{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
#alert-popup .ap-icon{font-size:28px;margin-bottom:8px}
#alert-popup .ap-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--gold);margin-bottom:4px}
#alert-popup .ap-body{font-size:12px;color:#ccc;line-height:1.6}
#alert-popup .ap-gap{font-family:'DM Mono',monospace;font-size:18px;color:var(--gold);margin:8px 0 4px;font-weight:500}
#alert-popup .ap-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
#alert-popup .ap-close:hover{color:var(--white)}

/* PERF */
.pc,.row{will-change:transform}
body::before{will-change:opacity}

/* ── MIDNIGHT FINALE OVERLAY ── */
#finale-overlay{
  display:none;
  position:fixed;inset:0;z-index:900;
  background:transparent;
  pointer-events:none;
}
#finale-overlay.active{
  display:block;
  pointer-events:all;
}
/* The black fade is handled by a pseudo-element with opacity transition */
#finale-overlay::after{
  content:'';
  position:absolute;inset:0;z-index:1;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:opacity 1s ease;
}
/* Keep fading class but make it very subtle — we want to see the beautiful night sky */
#finale-overlay.fading::after{
  opacity:0;
}

/* Animated dark background stars */
#finale-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,#0d0515 0%,#020008 60%,#000 100%);
  overflow:hidden;
}
#finale-bg canvas{position:absolute;inset:0;width:100%;height:100%}

/* Floating particles */
.finale-particle{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  animation:floatup linear infinite;
}
@keyframes floatup{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.5}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* Big centered countdown */
#finale-countdown-wrap{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
  z-index:10;
}
.finale-label{
  font-size:12px;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  color:rgba(212,168,83,0.6);margin-bottom:20px;
  animation:fadeInUp .8s ease both;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.finale-time{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(140px,40vw,320px);
  letter-spacing:8px;
  line-height:1;
  background:linear-gradient(135deg,#fff 0%,#d4a853 40%,#c0392b 80%,#fff 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;

/* ── STAR FIELD ANIMATION ── */
function initStarField(){
  const canvas=document.getElementById('star-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let W=canvas.width=window.innerWidth, H=canvas.height=window.innerHeight;
  const stars=[];
  for(let i=0;i<300;i++){
    stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*2+0.2,
      a:Math.random(),
      speed:Math.random()*0.5+0.1,
      twinkle:Math.random()*Math.PI*2,
      color: Math.random()>0.85 ? `hsl(${40+Math.random()*20},80%,80%)` : '#fff'
    });
  }
  // shooting stars
  const shoots=[];
  const shootColors=['rgba(255,255,220,','rgba(212,168,83,','rgba(200,180,255,','rgba(180,220,255,'];
  function addShoot(){
    const col=shootColors[Math.floor(Math.random()*shootColors.length)];
    shoots.push({
      x:Math.random()*W, y:Math.random()*H*0.6,
      vx:5+Math.random()*10, vy:2+Math.random()*6,
      life:1, maxLife:1,
      col, len:14+Math.random()*10, width:1+Math.random()*1.5
    });
  }
  // Fire several right away, then every 600ms
  for(let i=0;i<3;i++) setTimeout(addShoot, i*200);
  setInterval(addShoot, 600);

  function draw(){
    ctx.clearRect(0,0,W,H);
    // deep night sky gradient
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.9);
    grd.addColorStop(0,'rgba(8,3,22,1)');
    grd.addColorStop(0.4,'rgba(3,0,12,1)');
    grd.addColorStop(1,'rgba(0,0,0,1)');
    ctx.fillStyle=grd;
    ctx.fillRect(0,0,W,H);

    // nebula glow patches
    const nebula=ctx.createRadialGradient(W*0.25,H*0.35,0,W*0.25,H*0.35,W*0.45);
    nebula.addColorStop(0,'rgba(120,0,150,0.12)');
    nebula.addColorStop(1,'transparent');
    ctx.fillStyle=nebula; ctx.fillRect(0,0,W,H);
    const nebula2=ctx.createRadialGradient(W*0.75,H*0.55,0,W*0.75,H*0.55,W*0.35);
    nebula2.addColorStop(0,'rgba(180,80,0,0.09)');
    nebula2.addColorStop(1,'transparent');
    ctx.fillStyle=nebula2; ctx.fillRect(0,0,W,H);
    const nebula3=ctx.createRadialGradient(W*0.5,H*0.2,0,W*0.5,H*0.2,W*0.3);
    nebula3.addColorStop(0,'rgba(0,40,120,0.08)');
    nebula3.addColorStop(1,'transparent');
    ctx.fillStyle=nebula3; ctx.fillRect(0,0,W,H);

    // stars with twinkle
    stars.forEach(s=>{
      s.twinkle+=s.speed*0.04;
      const alpha=0.25+0.75*((Math.sin(s.twinkle)+1)/2);
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.color.replace(')',`,${alpha})`).replace('rgba','').startsWith('#')
        ? `rgba(255,255,255,${alpha})` : `rgba(255,255,255,${alpha})`;
      // Use the star's color
      if(s.color!=='#fff'){
        ctx.fillStyle=`hsla(45,80%,80%,${alpha})`;
      } else {
        ctx.fillStyle=`rgba(255,255,255,${alpha})`;
      }
      ctx.fill();
      // glow halo for bigger stars
      if(s.r>1.4){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);
        ctx.fillStyle=`rgba(200,180,255,${alpha*0.12})`;
        ctx.fill();
      }
    });

    // shooting stars with glowing trails
    for(let i=shoots.length-1;i>=0;i--){
      const sh=shoots[i];
      sh.x+=sh.vx; sh.y+=sh.vy; sh.life-=0.02;
      if(sh.life<=0||sh.x>W+50||sh.y>H+50){shoots.splice(i,1);continue;}
      // main trail
      const grad=ctx.createLinearGradient(sh.x,sh.y,sh.x-sh.vx*sh.len,sh.y-sh.vy*sh.len);
      grad.addColorStop(0,sh.col+`${sh.life})`);
      grad.addColorStop(0.4,sh.col+`${sh.life*0.5})`);
      grad.addColorStop(1,'transparent');
      ctx.strokeStyle=grad;
      ctx.lineWidth=sh.width;
      ctx.beginPath();
      ctx.moveTo(sh.x,sh.y);
      ctx.lineTo(sh.x-sh.vx*sh.len,sh.y-sh.vy*sh.len);
      ctx.stroke();
      // bright head glow
      ctx.beginPath();
      ctx.arc(sh.x,sh.y,sh.width*1.5,0,Math.PI*2);
      ctx.fillStyle=sh.col+`${sh.life})`;
      ctx.fill();
    }

    if(finaleActive) requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});
}

/* ── GAP ANALYSER ── */
function renderGapAnalyser(sorted){
  const marisIdx = sorted.findIndex(s=>s.registered_candidate===MARIS);
  if(marisIdx===-1){ document.getElementById('gap-analyser').style.display='none'; return; }
  document.getElementById('gap-analyser').style.display='block';

  const marisEntry  = sorted[marisIdx];
  const marisVotes  = marisEntry.vote_count;
  const marisRank   = marisIdx + 1;
  const aboveEntry  = marisIdx > 0 ? sorted[marisIdx-1] : null;
  const belowEntry  = marisIdx < sorted.length-1 ? sorted[marisIdx+1] : null;
  const aboveInfo   = aboveEntry ? info(aboveEntry.registered_candidate) : null;
  const belowInfo   = belowEntry ? info(belowEntry.registered_candidate) : null;

  const gapAbove = aboveEntry ? aboveEntry.vote_count - marisVotes : 0;
  const gapBelow = belowEntry ? marisVotes - belowEntry.vote_count : 0;

  let progressHtml = '';
  if(aboveEntry){
    const target  = aboveEntry.vote_count;
    const start   = belowEntry ? belowEntry.vote_count : 0;
    const range   = target - start || 1;
    const prog    = Math.min(100, Math.round(((marisVotes - start) / range) * 100));
    const needed  = gapAbove;
    progressHtml = `
      <div class="ga-progress">
        <div class="ga-prog-label">
          <span>Progress to overtake ${aboveInfo.name.split(',')[0]}</span>
          <strong>${needed.toLocaleString()} votes needed</strong>
        </div>
        <div class="ga-prog-track"><div class="ga-prog-fill" style="width:${prog}%"></div></div>
      </div>`;
  }

  let statusClass='', statusMsg='';
  if(marisRank===1){
    statusClass='leading';
    statusMsg=`🥇 Maris Stella is LEADING! ${gapBelow>0?'Ahead of '+belowInfo.name.split(',')[0]+' by '+gapBelow.toLocaleString()+' votes':''}`;
  } else if(gapAbove<=30){
    statusClass='close';
    statusMsg=`🔥 Very close! Only ${gapAbove.toLocaleString()} votes behind ${aboveInfo.name.split(',')[0]}. Push now!`;
  } else if(gapAbove<=100){
    statusClass='close';
    statusMsg=`📈 Getting there! ${gapAbove.toLocaleString()} votes to move up to rank ${marisRank-1}.`;
  } else {
    statusClass='behind';
    statusMsg=`📊 ${gapAbove.toLocaleString()} votes behind ${aboveInfo ? aboveInfo.name.split(',')[0] : 'the leader'}. Keep voting!`;
  }

  // Maris info
  const marisInfo = info(MARIS);
  const aboveLogo = aboveEntry ? info(aboveEntry.registered_candidate).logo : '';

  document.getElementById('gap-analyser').innerHTML = `
    <div class="ga-header">
      <div class="ga-title"><span class="ga-title-icon">📊</span> Maris Stella Gap Analyser</div>
      <div class="ga-rank-badge">Rank #${marisRank} of ${sorted.length}</div>
    </div>
    <div class="ga-body">
      <div class="ga-strip">

        <div class="ga-school ga-above">
          ${aboveEntry
            ? `${aboveLogo?`<img class="gs-logo" src="${aboveLogo}" crossorigin="anonymous" onerror="this.style.display='none'">`:'' }
               <div class="gs-name">${aboveInfo.name}</div>
               <div class="gs-votes">${aboveEntry.vote_count.toLocaleString()}</div>
               <div class="gs-rank">Rank #${marisRank-1}</div>`
            : `<div class="gs-name" style="color:var(--muted);font-size:8px;margin-top:8px">Leading — no one above</div>`
          }
        </div>

        <div class="ga-gaps">
          ${aboveEntry
            ? `<div class="ga-gap-item gap-above">
                <div class="gap-arrow">▲</div>
                <div class="gap-val">-${gapAbove.toLocaleString()}</div>
                <div class="gap-lbl">to overtake</div>
               </div>`
            : `<div class="ga-gap-item gap-leading">
                <div class="gap-arrow">★</div>
                <div class="gap-val">#1</div>
                <div class="gap-lbl">leading</div>
               </div>`
          }
          ${belowEntry
            ? `<div class="ga-gap-item gap-below">
                <div class="gap-arrow">▼</div>
                <div class="gap-val">+${gapBelow.toLocaleString()}</div>
                <div class="gap-lbl">ahead of next</div>
               </div>`
            : ''
          }
        </div>

        <div class="ga-school ga-maris">
          ${marisInfo.logo?`<img class="gs-logo" src="${marisInfo.logo}" crossorigin="anonymous" onerror="this.style.display='none'">`:'' }
          <div class="gs-name">Maris Stella College</div>
          <div class="gs-votes">${marisVotes.toLocaleString()}</div>
          <div class="gs-rank">Rank #${marisRank}</div>
        </div>

      </div>

      ${progressHtml}
      <div class="ga-status ${statusClass}">${statusMsg}</div>
    </div>`;
}

/* ── RENDER ── */
function render(data){
  lastData=data;
  const sorted=[...data].sort((a,b)=>b.vote_count-a.vote_count);
  const total=sorted.reduce((s,x)=>s+x.vote_count,0);
  const maxV=sorted[0]?.vote_count||1;
  const top3=sorted.slice(0,3), rest=sorted.slice(3);

  document.getElementById('s-schools').textContent=sorted.length;
  document.getElementById('s-total').textContent=fmt(total);

  checkMarisPosition(sorted);

  // Podium order: [2nd, 1st, 3rd] for left/center/right display
  const podOrder=top3.length>=2?[top3[1],top3[0],top3[2]]:[...top3];
  const podRanks=top3.length>=2?[2,1,3]:[1,2,3];

  let html=`<div class="section-label">Top 3</div><div class="podium">`;
  podOrder.forEach((s,i)=>{
    if(!s){html+=`<div class="pc"></div>`;return;}
    const r=podRanks[i],sc=info(s.registered_candidate);
    const pct=total>0?((s.vote_count/total)*100).toFixed(1):0;
    const isMaris=s.registered_candidate===MARIS;
    const d=prev[s.registered_candidate]!==undefined&&s.vote_count>prev[s.registered_candidate]?`<span class="delta">+${s.vote_count-prev[s.registered_candidate]}</span>`:'';
    html+=`<div class="pc r${r}${isMaris?' maris-glow':''}">
      <div class="ico">${medal(r)}</div>
      ${sc.logo?`<img class="logo" src="${sc.logo}" crossorigin="anonymous" onerror="this.style.display='none'">`:''}
      <div class="nm">${sc.name}</div>
      <div class="sc">${s.vote_count.toLocaleString()}${d}</div>
      <div class="pt">${pct}% of votes</div>
    </div>`;
  });
  html+=`</div>`;

  // Gap analyser slot
  html+=`<div id="gap-analyser"></div>`;

  if(rest.length){
    html+=`<div class="section-label">Full Rankings</div><div class="list">`;
    rest.forEach((s,i)=>{
      const rank=i+4,isLast=rank===sorted.length,sc=info(s.registered_candidate);
      const barW=Math.round((s.vote_count/maxV)*100);
      const isMaris=s.registered_candidate===MARIS;
      const d=prev[s.registered_candidate]!==undefined&&s.vote_count>prev[s.registered_candidate]?`<span class="delta">+${s.vote_count-prev[s.registered_candidate]}</span>`:'';
      html+=`<div class="row${isLast?' last-place':''}${isMaris?' maris-row':''}">
        <div class="rk">${rank}</div>
        ${sc.logo?`<img class="row-logo" src="${sc.logo}" crossorigin="anonymous" onerror="this.style.display='none'">`:'<div></div>'}
        <div><div class="rn">${sc.name}</div><div class="rmu">${sc.mu}</div></div>
        <div class="rr">
          <div class="rs">${s.vote_count.toLocaleString()}${d}</div>
          <div class="rb-wrap"><div class="rb" style="width:${barW}%"></div></div>
          ${isLast?'<div class="last-tag">LAST</div>':''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('board').innerHTML=html;
  sorted.forEach(s=>{prev[s.registered_candidate]=s.vote_count;});
  renderGapAnalyser(sorted);
}

function checkMarisPosition(sorted){
  if(!notifEnabled) return;
  const idx=sorted.findIndex(s=>s.registered_candidate===MARIS);
  if(idx===-1) return;
  const rank=idx+1, votes=sorted[idx].vote_count;
  if(prevMarisRank!==null&&prevMarisRank!==rank){
    if(rank===1){
      const gap=votes-(sorted[1]?.vote_count||0);
      sendNotification('🥇 MARIS STELLA IS #1!',`Leading with ${votes.toLocaleString()} votes! Ahead by ${gap.toLocaleString()}.`,'maris-1');

    } else if(rank===2){
      const gap=sorted[0].vote_count-votes;
      sendNotification('🥈 Maris Stella is 2nd!',`${votes.toLocaleString()} votes. ${gap.toLocaleString()} behind ${info(sorted[0].registered_candidate).name}.`,'maris-2');
      showAlertPopup('MARIS STELLA IS 2ND! 🥈',`Behind ${info(sorted[0].registered_candidate).name.split(',')[0]} by ${gap.toLocaleString()} votes`,`${votes.toLocaleString()} votes total`);
      showBanner(`<strong>🥈 Maris Stella moved to 2nd!</strong> ${votes.toLocaleString()} votes · ${gap.toLocaleString()} behind leader`);
    } else if(prevMarisRank<rank){
      sendNotification('⚠️ Maris Stella dropped to #'+rank,`Now rank ${rank} with ${votes.toLocaleString()} votes.`,'maris-drop');
      showBanner(`<strong>⚠️ Maris Stella dropped to rank ${rank}.</strong> ${votes.toLocaleString()} votes`,'red');
    }
  }
  prevMarisRank=rank;
}

/* ── MIDNIGHT COUNTDOWN with beautiful animation ── */
let finaleTriggered=false;
function updateMidnight(){
  const now=new Date();
  const midnight=new Date(2025,3,23,23,59,0,0); // April 23rd 11:59:00 PM
  const diff=midnight-now;

  if(diff<=0){
    document.getElementById('s-midnight').textContent='00:00:00';
    clearInterval(midnightInterval);
    if(!finaleTriggered){ finaleTriggered=true; triggerFinale(); }
    return;
  }

  const totalSec=Math.floor(diff/1000);
  const h=String(Math.floor(diff/3600000)).padStart(2,'0');
  const m=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  const s=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
  const timeStr=`${h}:${m}:${s}`;

  // Per-digit animation: only animate digits that actually changed
  const el=document.getElementById('s-midnight');
  const newChars=timeStr.split('');
  const oldSpans=el.querySelectorAll('span[data-ci]');

  if(oldSpans.length!==newChars.length){
    el.innerHTML=newChars.map((c,i)=>`<span data-ci="${i}">${c}</span>`).join('');
  } else {
    oldSpans.forEach((span,i)=>{
      if(span.textContent!==newChars[i]){
        span.textContent=newChars[i];
        span.classList.remove('countdown-tick');
        void span.offsetWidth;
        span.classList.add('countdown-tick');
      }
    });
  }

  // Urgent styling when under 10 min
  if(totalSec<=600){
    el.classList.add('countdown-urgent');
    el.style.color='#c0392b';
  } else {
    el.classList.remove('countdown-urgent');
    el.style.color='';
  }

  // TRIGGER FINALE at exactly 10 seconds left
  if(ENABLE_FINALE_OVERLAY && totalSec<=10&&!finaleActive){
    triggerFinaleCountdown();
  }

  // Update finale display if active — show only seconds during 10s countdown
  if(finaleActive){
    const fd=document.getElementById('finale-time-display');
    if(fd){
      const secsLeft=Math.min(10,Math.max(0,Math.ceil(diff/1000)));
      const newNum=secsLeft>0?String(secsLeft):'0';
      if(fd.textContent!==newNum){
        fd.textContent=newNum;
        fd.classList.remove('number-pop');
        void fd.offsetWidth;
        fd.classList.add('number-pop');
      }
    }
  }
}
const midnightInterval=setInterval(updateMidnight,1000);
updateMidnight();

  finaleSongAudio.loop = false;
  finaleSongAudio.play().catch(()=>{});
}

/* ── MIDNIGHT CELEBRATION ── */
let celebrationFired=false;
function checkMidnightCelebration(force=false){
  if(celebrationFired||(!lastData.length&&!force)) return;
  const sorted=[...lastData].sort((a,b)=>b.vote_count-a.vote_count);
  celebrationFired=true;
  const votes=sorted[0]?.vote_count||0;

/* ── CONFETTI ── */
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const pieces=[];
  const colors=['#d4a853','#c0392b','#f0f0f0','#9ba3af','#4caf50','#e74c3c','#f39c12'];
  for(let i=0;i<250;i++){
    pieces.push({
      x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*0.5,
      w:6+Math.random()*8, h:10+Math.random()*14,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360, rotSpeed:(Math.random()-0.5)*6,
      vx:(Math.random()-0.5)*4, vy:2+Math.random()*4,
      alpha:1
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpeed;
      if(frame>180) p.alpha=Math.max(0,p.alpha-0.008);
      if(p.y<canvas.height+40&&p.alpha>0) alive=true;
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(alive) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ── INITIAL FETCH ── */
async function fetchAll(){
  try{
    const res=await fetch(API,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data&&data.length) render(data);
    document.getElementById('rt-status').textContent='🟢 Realtime · Updates are instant';
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="err"><strong>Could not fetch scores.</strong><br>${e.message}</div>`;
  }
}

/* ── SUPABASE REALTIME ── */
function initRealtime(){
  const wsUrl=`wss://osxijjbjgxvaeurpghtv.supabase.co/realtime/v1/websocket?apikey=${KEY}&vsn=1.0.0`;
  let ws,ping;
  function connect(){
    ws=new WebSocket(wsUrl);
    ws.onopen=()=>{
      ws.send(JSON.stringify({topic:'realtime:public:mpmu_votes',event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:'mpmu_votes'}]}},ref:'1'}));
      ping=setInterval(()=>ws.readyState===1&&ws.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:'hb'})),25000);
      document.getElementById('rt-status').textContent='🟢 Realtime · Updates are instant';
    };
    ws.onmessage=e=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg.event==='phx_reply'&&msg.payload?.status==='ok'){ fetchAll(); return; }
        if(msg.event==='postgres_changes'){
          const {record,old_record,type}=msg.payload?.data||{};
          if(!record&&!old_record) return;
          if(type==='UPDATE'||type==='INSERT'){
            const idx=lastData.findIndex(s=>s.registered_candidate===record.registered_candidate);
            if(idx!==-1) lastData[idx]={...lastData[idx],vote_count:record.vote_count};
            else lastData.push({registered_candidate:record.registered_candidate,vote_count:record.vote_count});
            scheduleRender(lastData);
            document.getElementById('rt-status').textContent='🟢 Realtime · '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
          }
          if(type==='DELETE'&&old_record){
            lastData=lastData.filter(s=>s.registered_candidate!==old_record.registered_candidate);
            scheduleRender(lastData);
          }
        }
      }catch(_){}
    };
    ws.onerror=()=>{ document.getElementById('rt-status').textContent='⚠ Realtime error — reconnecting…'; };
    ws.onclose=()=>{ clearInterval(ping); document.getElementById('rt-status').textContent='⚠ Reconnecting…'; setTimeout(connect,3000); };
  }
  connect();
}

function toast(msg,ms=2800){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),ms); }

fetchAll().then(()=>initRealtime());
